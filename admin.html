<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM后台 · ARCANA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Noto+Serif+SC:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a26;
    --border: #2a2a40; --border2: #3a3a58;
    --gold: #c9a84c; --gold2: #e8c97a; --gold3: #f5dfa0;
    --red: #c0392b; --red2: #e74c3c;
    --text: #e8e0d0; --text2: #a09880; --text3: #6a6050;
    --green: #00b894; --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
  }

  /* LOGIN */
  #admin-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
  }

  .login-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 48px 40px;
    width: 360px;
    text-align: center;
    box-shadow: 0 0 60px rgba(201,168,76,0.1);
  }

  .login-title { font-family:'Cinzel',serif; font-size:24px; color:var(--gold); letter-spacing:4px; margin-bottom:6px; }
  .login-sub { color:var(--text3); font-size:12px; margin-bottom:32px; letter-spacing:2px; }

  input, select, textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--gold); }

  .btn {
    padding: 11px 20px;
    border-radius: var(--radius);
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    border: none;
    letter-spacing: 1px;
  }

  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #1a1000; font-weight:600; }
  .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-red { background: transparent; border: 1px solid var(--red2); color: var(--red2); }
  .btn-red:hover { background: rgba(231,76,60,0.1); }
  .btn-green { background: transparent; border: 1px solid var(--green); color: var(--green); }
  .btn-green:hover { background: rgba(0,184,148,0.1); }
  .btn-full { width: 100%; }

  .err { color: var(--red2); font-size:12px; margin-top:8px; min-height:18px; }

  /* ADMIN PANEL */
  #admin-panel { display: none; }
  #admin-panel.visible { display: block; }

  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-title { font-family:'Cinzel',serif; color:var(--gold); font-size:18px; letter-spacing:3px; }
  .topbar-info { font-size:13px; color:var(--text3); }

  .layout { display: flex; min-height: calc(100vh - 56px); }

  /* SIDEBAR */
  .sidebar {
    width: 200px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    color: var(--text3);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .sidebar-item:hover { color: var(--text2); background: var(--bg3); }
  .sidebar-item.active { color: var(--gold); background: rgba(201,168,76,0.08); border-right: 2px solid var(--gold); }

  /* MAIN CONTENT */
  .main { flex: 1; padding: 28px; overflow-y: auto; }

  .section { display: none; }
  .section.active { display: block; }

  .section-title {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 16px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title { font-size:13px; color:var(--text2); letter-spacing:1px; margin-bottom:14px; }

  .row { display:flex; gap:10px; align-items:flex-start; flex-wrap:wrap; }
  .row input, .row select { margin-bottom:0; flex:1; min-width:120px; }

  /* TABLE */
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; padding:10px 12px; font-size:11px; color:var(--text3); letter-spacing:1px; border-bottom:1px solid var(--border); font-weight:400; }
  td { padding:10px 12px; font-size:13px; color:var(--text2); border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--bg3); }

  .badge { display:inline-block; background:var(--bg3); border:1px solid var(--border2); border-radius:20px; padding:2px 10px; font-size:11px; color:var(--text3); font-family:monospace; }
  .badge.gold { border-color:var(--gold); color:var(--gold); }

  /* CARD GRID */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:10px; }

  .card-item {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  .card-item img { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; }
  .card-item-text { width:100%; aspect-ratio:2/3; display:flex; align-items:center; justify-content:center; padding:8px; font-size:11px; color:var(--text); text-align:center; }
  .card-item-name { padding:4px 6px; font-size:10px; color:var(--text3); text-align:center; border-top:1px solid var(--border); }

  .card-item-del {
    position:absolute; top:4px; right:4px;
    width:20px; height:20px;
    background:rgba(231,76,60,0.85);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; cursor:pointer;
    opacity:0; transition:opacity 0.15s;
    border:none; color:white;
  }

  .card-item:hover .card-item-del { opacity:1; }

  .upload-area {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    color: var(--text3);
    font-size:13px; letter-spacing:1px;
    margin-bottom:12px;
  }

  .upload-area:hover { border-color:var(--gold); color:var(--gold2); }

  .toggle { width:40px; height:22px; background:var(--border2); border-radius:11px; position:relative; cursor:pointer; transition:background 0.2s; flex-shrink:0; }
  .toggle.on { background:var(--green); }
  .toggle::after { content:''; position:absolute; width:16px; height:16px; background:white; border-radius:50%; top:3px; left:3px; transition:left 0.2s; }
  .toggle.on::after { left:21px; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; }
  .toggle-label { font-size:13px; color:var(--text2); }

  .notif { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--bg2); border:1px solid var(--gold); border-radius:var(--radius); padding:12px 24px; font-size:14px; color:var(--gold2); z-index:3000; animation:notifIn 0.3s ease, notifOut 0.3s ease 2.7s forwards; white-space:nowrap; box-shadow:var(--shadow); }
  @keyframes notifIn { from{opacity:0;top:10px} to{opacity:1;top:20px} }
  @keyframes notifOut { from{opacity:1} to{opacity:0} }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  .sep { height:1px; background:var(--border); margin:16px 0; }

  .file-input { display:none; }

  .empty { text-align:center; padding:32px; color:var(--text3); font-size:13px; }

  .player-hand-card {
    display:flex; align-items:center; gap:10px;
    padding:10px 12px;
    background:var(--bg3); border-radius:8px; margin-bottom:8px;
  }

  .player-hand-card img { width:36px; height:50px; object-fit:cover; border-radius:4px; flex-shrink:0; }
  .phc-text { width:36px; height:50px; background:var(--bg2); border:1px solid var(--border2); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text3); flex-shrink:0; }
  .phc-info { flex:1; }
  .phc-name { font-size:13px; color:var(--text); }
  .phc-source { font-size:11px; color:var(--text3); margin-top:2px; }
</style>
</head>
<body>

<!-- ADMIN LOGIN -->
<div id="admin-login">
  <div class="login-box">
    <div class="login-title">王座后台</div>
    <div class="login-sub">GM ADMIN PANEL</div>
    <input type="text" id="al-room" placeholder="GM登录码（如 room1）" />
    <input type="password" id="al-pwd" placeholder="管理员总密码" />
    <button class="btn btn-gold btn-full" onclick="adminLogin()">进入后台</button>
    <div class="err" id="al-err"></div>
    <div style="display:flex;align-items:center;gap:12px;margin:20px 0 8px">
      <div style="flex:1;height:1px;background:#2a2a40"></div>
      <span style="font-size:12px;color:#6a6050">或</span>
      <div style="flex:1;height:1px;background:#2a2a40"></div>
    </div>
    <button class="btn btn-outline btn-full" onclick="showCreateRoomBox()">创建新房间</button>
    <div id="create-room-box" style="display:none;margin-top:16px">
      <div style="font-size:12px;color:#6a6050;margin-bottom:6px">管理员密码</div>
      <input type="password" id="cr-pwd" placeholder="输入管理员密码" />
      <div style="font-size:12px;color:#6a6050;margin-bottom:6px">GM登录码</div>
      <input type="text" id="cr-gm-code2" placeholder="例如：room1（自定义）" />
      <button class="btn btn-gold btn-full" onclick="createRoomPublic()">创建房间</button>
      <div class="err" id="cr-err2"></div>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="topbar">
    <div class="topbar-title">ARCANA · 王座后台</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="topbar-info" id="room-info"></div>
      <button onclick="adminLogout()" style="background:none;border:1px solid #3a3a58;border-radius:8px;padding:5px 12px;color:#6a6050;font-size:11px;cursor:pointer;font-family:'Noto Serif SC',serif">退出</button>
    </div>
  </div>

  <div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="sidebar-item active" onclick="showSection('createroom', this)">🏠 创建房间</button>
      <button class="sidebar-item" onclick="showSection('players', this)">👥 角色管理</button>
      <button class="sidebar-item" onclick="showSection('pools', this)">🗂️ 卡池管理</button>
      <button class="sidebar-item" onclick="showSection('cards', this)">🃏 卡牌管理</button>
      <button class="sidebar-item" onclick="showSection('hands', this)">✋ 玩家手牌</button>
      <button class="sidebar-item" onclick="showSection('display', this)">👁️ 展示区设置</button>
      <button class="sidebar-item" onclick="showSection('discard', this)">🗑️ 公共弃牌区</button>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- CREATE ROOM -->
      <div class="section active" id="sec-createroom">
        <div class="section-title">创建房间</div>
        <div class="card">
          <div class="card-title">新建游戏房间</div>
          <div style="margin-bottom:10px">
            <div style="font-size:12px;color:var(--text3);margin-bottom:6px">GM登录码（玩家不可见）</div>
            <input type="text" id="cr-gm-code" placeholder="例如：room1（自定义）" />
          </div>
          <button class="btn btn-gold btn-full" onclick="createRoomFromAdmin()">创建房间</button>
          <div class="err" id="cr-err"></div>
        </div>
        <div class="card" id="cr-result" style="display:none">
          <div class="card-title">✅ 房间创建成功</div>
          <div style="font-size:13px;color:var(--text2);line-height:2">
            <div>GM登录码：<span id="cr-show-code" style="color:var(--gold);font-family:monospace"></span></div>
            <div style="font-size:12px;color:var(--text3);margin-top:8px">请用此码进入GM后台，并为玩家创建角色</div>
          </div>
        </div>
      </div>

      <!-- CREATE ROOM -->
      <div class="section active" id="sec-createroom">
        <div class="section-title">创建房间</div>
        <div class="card">
          <div class="card-title">新建游戏房间</div>
          <div style="margin-bottom:10px">
            <div style="font-size:12px;color:var(--text3);margin-bottom:6px">GM登录码</div>
            <input type="text" id="cr-gm-code" placeholder="例如：room1（自定义）" />
          </div>
          <button class="btn btn-gold btn-full" onclick="createRoomFromAdmin()">创建房间</button>
          <div class="err" id="cr-err"></div>
        </div>
        <div class="card" id="cr-result" style="display:none">
          <div class="card-title">✅ 房间创建成功</div>
          <div style="font-size:13px;color:var(--text2);line-height:2">
            <div>GM登录码：<span id="cr-show-code" style="color:var(--gold);font-family:monospace"></span></div>
            <div style="font-size:12px;color:var(--text3);margin-top:8px">请用此码进入GM后台，并为玩家创建角色</div>
          </div>
        </div>
      </div>

      <!-- PLAYERS -->
      <div class="section" id="sec-players">
        <div class="section-title">角色管理</div>
        <div class="card">
          <div class="card-title">新建角色</div>
          <div class="row">
            <input type="text" id="new-player-name" placeholder="角色名（如：小白）" />
            <input type="text" id="new-player-code" placeholder="专属登录码（自定义）" />
            <button class="btn btn-gold" onclick="createPlayer()">创建</button>
          </div>
        </div>
        <div class="card">
          <div class="card-title">角色列表</div>
          <div id="players-list"><div class="empty">加载中...</div></div>
        </div>
      </div>

      <!-- POOLS -->
      <div class="section" id="sec-pools">
        <div class="section-title">卡池管理</div>
        <div class="card">
          <div class="card-title">新建公共卡池</div>
          <div class="row">
            <input type="text" id="new-pool-name" placeholder="卡池名称（如：主牌库）" />
            <button class="btn btn-gold" onclick="createPublicPool()">创建</button>
          </div>
        </div>
        <div class="card">
          <div class="card-title">公共卡池列表</div>
          <div id="pools-list"><div class="empty">加载中...</div></div>
        </div>
      </div>

      <!-- CARDS -->
      <div class="section" id="sec-cards">
        <div class="section-title">卡牌管理</div>
        <div class="card">
          <div class="card-title">上传卡牌</div>
          <div class="row" style="margin-bottom:10px">
            <select id="card-pool-select" style="margin-bottom:0"></select>
            <input type="text" id="card-name-input" placeholder="卡牌名称（可选）" style="margin-bottom:0" />
          </div>

          <!-- Image upload -->
          <div class="upload-area" onclick="document.getElementById('img-upload').click()">
            📷 点击上传图片卡（可多选）
          </div>
          <input type="file" id="img-upload" class="file-input" multiple accept="image/*" onchange="uploadImages()" />

          <!-- Text card -->
          <div class="sep"></div>
          <textarea id="text-card-content" placeholder="输入文字卡内容..." rows="3" style="resize:vertical"></textarea>
          <button class="btn btn-outline" onclick="addTextCard()">添加文字卡</button>
        </div>

        <div class="card">
          <div class="card-title">卡池预览</div>
          <div class="row" style="margin-bottom:14px">
            <select id="preview-pool-select" onchange="previewPool()" style="margin-bottom:0"></select>
          </div>
          <div class="card-grid" id="card-preview-grid"></div>
        </div>
      </div>

      <!-- HANDS -->
      <div class="section" id="sec-hands">
        <div class="section-title">玩家手牌管理</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;" id="hand-player-tabs"></div>
        <div id="hand-content"><div class="empty">请选择玩家</div></div>
      </div>

      <!-- DISPLAY ZONES -->
      <div class="section" id="sec-display">
        <div class="section-title">展示区设置</div>
        <div id="display-zone-settings"><div class="empty">加载中...</div></div>
      </div>

      <!-- PUBLIC DISCARD -->
      <div class="section" id="sec-discard">
        <div class="section-title">公共弃牌区</div>
        <div id="public-discard-content"><div class="empty">加载中...</div></div>
      </div>

    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gfesocpvhhchgyheibqt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmZXNvY3B2aGhjaGd5aGVpYnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDgwMzQsImV4cCI6MjA5NTgyNDAzNH0.uFr9RObNZ6P8ssHqfoFeOiw38-TZ9lL7ptuGydJOfgE';
const ADMIN_PASSWORD = 'Irene1003';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentRoom = null;
let currentGM = null;
let allPlayers = [];

function enterAdmin(roomCode) {
  document.getElementById('admin-login').style.display = 'none';
  document.getElementById('admin-panel').classList.add('visible');
  document.getElementById('room-info').textContent = `房间：${roomCode} · GM：${currentGM.name}`;
  // Save session
  localStorage.setItem('arcana_admin_code', roomCode);
  loadAll();
}

function showCreateRoomBox() {
  const box = document.getElementById('create-room-box');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

async function createRoomPublic() {
  const pwd = document.getElementById('cr-pwd').value.trim();
  const gmCode = document.getElementById('cr-gm-code2').value.trim();
  const err = document.getElementById('cr-err2');
  err.textContent = '';
  if (pwd !== ADMIN_PASSWORD) { err.textContent = '管理员密码错误'; return; }
  if (!gmCode) { err.textContent = '请填写GM登录码'; return; }
  const { data: existing } = await sb.from('rooms').select('id').eq('room_code', gmCode);
  if (existing && existing.length > 0) { err.textContent = '该房间码已存在，请换一个'; return; }
  const { data: allRooms } = await sb.from('rooms').select('room_number').order('room_number', {ascending:false}).limit(1);
  const nextNum = allRooms && allRooms.length > 0 ? allRooms[0].room_number + 1 : 1;
  const { data: room, error } = await sb.from('rooms').insert({
    room_code: gmCode, room_number: nextNum, admin_password: pwd
  }).select().single();
  if (error) { err.textContent = '创建失败：' + error.message; return; }
  await sb.from('players').insert({ room_id: room.id, name: '王座', access_code: gmCode, is_gm: true, seat_number: 0 });
  for (let i = 1; i <= 6; i++) {
    await sb.from('display_zones').insert({ room_id: room.id, zone_number: i, name: '展示区' + i, visible_to: [] });
  }
  err.style.color = 'var(--green)';
  err.textContent = '✅ 创建成功！GM码：' + gmCode;
}

async function adminLogin() {
  const roomCode = document.getElementById('al-room').value.trim();
  const pwd = document.getElementById('al-pwd').value.trim();
  const err = document.getElementById('al-err');
  err.textContent = '';

  if (pwd !== ADMIN_PASSWORD) { err.textContent = '管理员密码错误'; return; }

  const { data: rooms } = await sb.from('rooms').select('*').eq('room_code', roomCode);
  if (!rooms || rooms.length === 0) { err.textContent = '找不到该房间'; return; }

  currentRoom = rooms[0];
  const { data: gm } = await sb.from('players').select('*').eq('room_id', currentRoom.id).eq('is_gm', true);
  currentGM = gm[0];

  enterAdmin(roomCode);
}

async function tryAdminAutoLogin() {
  const saved = localStorage.getItem('arcana_admin_code');
  if (!saved) return;
  try {
    const { data: rooms } = await sb.from('rooms').select('*').eq('room_code', saved);
    if (!rooms || rooms.length === 0) { localStorage.removeItem('arcana_admin_code'); return; }
    currentRoom = rooms[0];
    const { data: gm } = await sb.from('players').select('*').eq('room_id', currentRoom.id).eq('is_gm', true);
    if (!gm || gm.length === 0) { localStorage.removeItem('arcana_admin_code'); return; }
    currentGM = gm[0];
    enterAdmin(saved);
  } catch(e) { localStorage.removeItem('arcana_admin_code'); }
}

tryAdminAutoLogin();

async function loadAll() {
  await loadPlayers();
  await loadPools();
  await loadPoolSelects();
  await loadHandTabs();
  await loadDisplayZoneSettings();
  await loadPublicDiscard();
}

// ===== PLAYERS =====
async function loadPlayers() {
  const { data } = await sb.from('players').select('*').eq('room_id', currentRoom.id).order('seat_number');
  allPlayers = data || [];
  const el = document.getElementById('players-list');

  if (!data || data.length === 0) { el.innerHTML = '<div class="empty">暂无角色</div>'; return; }

  el.innerHTML = `
    <table>
      <tr><th>角色名</th><th>登录码</th><th>类型</th><th>私人卡池</th><th>操作</th></tr>
      ${data.map(p => `
        <tr>
          <td>${p.name}</td>
          <td><span class="badge ${p.is_gm?'gold':''}">${p.access_code}</span></td>
          <td>${p.is_gm ? '<span class="badge gold">王座</span>' : '玩家'}</td>
          <td><button class="btn btn-outline" style="padding:5px 10px;font-size:11px" onclick="goToPlayerPool('${p.id}','${p.name}')">管理卡池</button></td>
          <td>${!p.is_gm ? `<button class="btn btn-red" style="padding:5px 10px;font-size:11px" onclick="deletePlayer('${p.id}')">删除</button>` : ''}</td>
        </tr>
      `).join('')}
    </table>
  `;
}

async function createPlayer() {
  const name = document.getElementById('new-player-name').value.trim();
  const code = document.getElementById('new-player-code').value.trim();
  if (!name || !code) { showNotif('请填写角色名和登录码'); return; }

  const { data: existing } = await sb.from('players').select('id').eq('access_code', code);
  if (existing && existing.length > 0) { showNotif('该登录码已存在'); return; }

  const seatNum = allPlayers.filter(p=>!p.is_gm).length + 1;

  const { data: player, error } = await sb.from('players').insert({
    room_id: currentRoom.id,
    name, access_code: code,
    is_gm: false,
    seat_number: seatNum
  }).select().single();

  if (error) { showNotif('创建失败：' + error.message); return; }

  // Create private pool
  await sb.from('private_pools').insert({ room_id: currentRoom.id, player_id: player.id });

  document.getElementById('new-player-name').value = '';
  document.getElementById('new-player-code').value = '';
  showNotif(`角色 "${name}" 创建成功！登录码：${code}`);
  loadAll();
}

async function deletePlayer(playerId) {
  if (!confirm('确定删除这个角色？相关数据将一并删除。')) return;
  await sb.from('players').delete().eq('id', playerId);
  showNotif('已删除');
  loadAll();
}

// ===== POOLS =====
async function loadPools() {
  const { data } = await sb.from('public_pools').select('*').eq('room_id', currentRoom.id).order('created_at');
  const el = document.getElementById('pools-list');
  if (!data || data.length === 0) { el.innerHTML = '<div class="empty">暂无公共卡池</div>'; return; }

  el.innerHTML = `
    <table>
      <tr><th>卡池名称</th><th>可重复抽</th><th>操作</th></tr>
      ${data.map(p => `
        <tr>
          <td>
            <input type="text" value="${p.name}" style="margin:0;padding:6px 10px;font-size:13px;width:180px"
              onblur="renamePool('${p.id}', this.value)" />
          </td>
          <td>
            <div class="toggle ${p.allow_duplicates?'on':''}" onclick="toggleDuplicate('${p.id}', this)"></div>
          </td>
          <td>
            <button class="btn btn-red" style="padding:5px 10px;font-size:11px" onclick="deletePool('${p.id}')">删除</button>
          </td>
        </tr>
      `).join('')}
    </table>
  `;
}

async function createPublicPool() {
  const name = document.getElementById('new-pool-name').value.trim();
  if (!name) { showNotif('请填写卡池名称'); return; }
  await sb.from('public_pools').insert({ room_id: currentRoom.id, name, allow_duplicates: true });
  document.getElementById('new-pool-name').value = '';
  showNotif('卡池创建成功');
  loadAll();
}

async function renamePool(poolId, name) {
  if (!name.trim()) return;
  await sb.from('public_pools').update({ name: name.trim() }).eq('id', poolId);
  showNotif('已重命名');
}

async function toggleDuplicate(poolId, el) {
  const newVal = !el.classList.contains('on');
  el.classList.toggle('on');
  await sb.from('public_pools').update({ allow_duplicates: newVal }).eq('id', poolId);
}

async function deletePool(poolId) {
  if (!confirm('确定删除此卡池？卡池内的卡牌也会一并删除。')) return;
  await sb.from('cards').delete().eq('pool_id', poolId);
  await sb.from('public_pools').delete().eq('id', poolId);
  showNotif('已删除');
  loadAll();
}

// ===== POOL SELECTS =====
async function loadPoolSelects() {
  const { data: pubPools } = await sb.from('public_pools').select('*').eq('room_id', currentRoom.id);
  const { data: privPools } = await sb.from('private_pools').select('*, players(name)').eq('room_id', currentRoom.id);

  const options = [
    ...(pubPools||[]).map(p => `<option value="${p.id}|public">${p.name}</option>`),
    ...(privPools||[]).map(p => `<option value="${p.id}|private">🔒 ${p.players?.name}的私人卡池</option>`)
  ].join('');

  document.getElementById('card-pool-select').innerHTML = options || '<option>暂无卡池</option>';
  document.getElementById('preview-pool-select').innerHTML = options || '<option>暂无卡池</option>';
  if (pubPools && pubPools.length > 0) previewPool();
}

// ===== CARDS =====
async function uploadImages() {
  const files = document.getElementById('img-upload').files;
  const poolVal = document.getElementById('card-pool-select').value;
  const cardName = document.getElementById('card-name-input').value.trim();
  if (!poolVal || !files.length) return;

  const [poolId, poolType] = poolVal.split('|');
  showNotif(`上传中，请稍候...`);

  for (const file of files) {
    const ext = file.name.split('.').pop();
    const path = `${currentRoom.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

    const { data: uploaded, error: upErr } = await sb.storage.from('card-images').upload(path, file);
    if (upErr) { showNotif('上传失败：' + upErr.message); continue; }

    const { data: urlData } = sb.storage.from('card-images').getPublicUrl(path);

    await sb.from('cards').insert({
      room_id: currentRoom.id,
      pool_type: poolType,
      pool_id: poolId,
      card_type: 'image',
      content: urlData.publicUrl,
      name: cardName || file.name.replace(/\.[^.]+$/, '')
    });
  }

  showNotif(`上传完成！`);
  document.getElementById('img-upload').value = '';
  document.getElementById('card-name-input').value = '';
  previewPool();
}

async function addTextCard() {
  const content = document.getElementById('text-card-content').value.trim();
  const poolVal = document.getElementById('card-pool-select').value;
  const cardName = document.getElementById('card-name-input').value.trim();
  if (!content || !poolVal) { showNotif('请选择卡池并填写内容'); return; }

  const [poolId, poolType] = poolVal.split('|');
  await sb.from('cards').insert({
    room_id: currentRoom.id,
    pool_type: poolType,
    pool_id: poolId,
    card_type: 'text',
    content,
    name: cardName || content.slice(0, 10)
  });

  document.getElementById('text-card-content').value = '';
  document.getElementById('card-name-input').value = '';
  showNotif('文字卡添加成功');
  previewPool();
}

async function previewPool() {
  const poolVal = document.getElementById('preview-pool-select').value;
  if (!poolVal) return;
  const [poolId] = poolVal.split('|');

  const { data: cards } = await sb.from('cards').select('*').eq('pool_id', poolId).order('created_at');
  const el = document.getElementById('card-preview-grid');

  if (!cards || cards.length === 0) { el.innerHTML = '<div class="empty">此卡池暂无卡牌</div>'; return; }

  el.innerHTML = cards.map(card => {
    const content = card.card_type === 'image'
      ? `<img src="${card.content}" />`
      : `<div class="card-item-text">${card.content}</div>`;
    return `
      <div class="card-item">
        ${content}
        <div class="card-item-name">${card.name || ''}</div>
        <button class="card-item-del" onclick="deleteCard('${card.id}')">✕</button>
      </div>
    `;
  }).join('');
}

async function deleteCard(cardId) {
  if (!confirm('确定删除这张卡？')) return;
  await sb.from('cards').delete().eq('id', cardId);
  showNotif('已删除');
  previewPool();
}

function goToPlayerPool(playerId, playerName) {
  // Switch to cards section and select player's private pool
  showSection('cards', document.querySelector('.sidebar-item:nth-child(3)'));
  setTimeout(() => {
    const sel = document.getElementById('card-pool-select');
    for (const opt of sel.options) {
      if (opt.text.includes(playerName + '的私人卡池')) { sel.value = opt.value; break; }
    }
    const psel = document.getElementById('preview-pool-select');
    for (const opt of psel.options) {
      if (opt.text.includes(playerName + '的私人卡池')) { psel.value = opt.value; previewPool(); break; }
    }
  }, 100);
}

// ===== HAND MANAGEMENT =====
async function loadHandTabs() {
  const { data: players } = await sb.from('players').select('*').eq('room_id', currentRoom.id).order('seat_number');
  const el = document.getElementById('hand-player-tabs');
  el.innerHTML = '';
  (players||[]).forEach((p,i) => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline' + (i===0?' active':'');
    btn.textContent = p.name;
    btn.style.cssText = 'padding:8px 16px;font-size:13px';
    btn.onclick = () => {
      document.querySelectorAll('#hand-player-tabs .btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      loadPlayerHand(p.id);
    };
    el.appendChild(btn);
    if (i===0) loadPlayerHand(p.id);
  });
}

let viewingHand = null;

async function loadPlayerHand(playerId) {
  viewingHand = playerId;
  const el = document.getElementById('hand-content');
  const { data: hcs } = await sb.from('hand_cards').select('*, cards(*)').eq('player_id', playerId).order('acquired_at', {ascending:false});

  if (!hcs || hcs.length === 0) { el.innerHTML = '<div class="empty">手牌为空</div>'; return; }

  el.innerHTML = hcs.map(hc => {
    const card = hc.cards;
    const thumb = card.card_type === 'image'
      ? `<img src="${card.content}" />`
      : `<div class="phc-text">文字</div>`;
    return `
      <div class="player-hand-card">
        ${thumb}
        <div class="phc-info">
          <div class="phc-name">${card.name || (card.card_type==='text'?card.content.slice(0,20):'图片卡')}</div>
          <div class="phc-source">${card.card_type === 'image' ? '图片卡' : '文字卡'}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline" style="padding:5px 10px;font-size:11px" onclick="gmMoveHandCard('${hc.id}','${card.id}')">移动</button>
          <button class="btn btn-red" style="padding:5px 10px;font-size:11px" onclick="gmDeleteHandCard('${hc.id}')">删除</button>
        </div>
      </div>
    `;
  }).join('');
}

async function gmDeleteHandCard(hcId) {
  if (!confirm('确定删除这张手牌？')) return;
  await sb.from('hand_cards').delete().eq('id', hcId);
  showNotif('已删除');
  loadPlayerHand(viewingHand);
}

async function gmMoveHandCard(hcId, cardId) {
  // Build pool options
  const { data: pubPools } = await sb.from('public_pools').select('*').eq('room_id', currentRoom.id);
  const { data: privPools } = await sb.from('private_pools').select('*, players(name)').eq('room_id', currentRoom.id);

  const opts = [
    ...(pubPools||[]).map(p => `${p.id}|public|${p.name}`),
    ...(privPools||[]).map(p => `${p.id}|private|${p.players?.name}的私人卡池`)
  ];

  const list = opts.map((o,i) => `${i+1}. ${o.split('|')[2]}`).join('\n');
  const choice = prompt(`移动到哪个卡池？输入序号：\n${list}`);
  if (!choice) return;

  const idx = parseInt(choice) - 1;
  if (isNaN(idx) || idx < 0 || idx >= opts.length) { showNotif('无效序号'); return; }

  const [poolId, poolType] = opts[idx].split('|');

  // Get current card info
  const { data: card } = await sb.from('cards').select('*').eq('id', cardId).single();

  // Add to target pool
  await sb.from('cards').insert({
    room_id: currentRoom.id,
    pool_type: poolType,
    pool_id: poolId,
    card_type: card.card_type,
    content: card.content,
    name: card.name
  });

  // Remove from hand
  await sb.from('hand_cards').delete().eq('id', hcId);
  showNotif('移动成功');
  loadPlayerHand(viewingHand);
}

// ===== DISPLAY ZONES =====
async function loadDisplayZoneSettings() {
  const { data: zones } = await sb.from('display_zones').select('*').eq('room_id', currentRoom.id).order('zone_number');
  const { data: players } = await sb.from('players').select('*').eq('room_id', currentRoom.id);
  const el = document.getElementById('display-zone-settings');

  el.innerHTML = (zones||[]).map(z => `
    <div class="card">
      <div class="row" style="margin-bottom:12px;align-items:center">
        <input type="text" value="${z.name}" style="margin:0;width:180px"
          onblur="renameZone('${z.id}', this.value)" />
        <span style="font-size:12px;color:var(--text3)">展示区 ${z.zone_number}</span>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">可见玩家（空=所有人可见）：</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${(players||[]).filter(p=>!p.is_gm).map(p => {
          const isVisible = z.visible_to.length === 0 || z.visible_to.includes(p.id);
          return `
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text2)">
              <input type="checkbox" ${isVisible?'checked':''} onchange="updateZoneVisibility('${z.id}', '${p.id}', this.checked, '${JSON.stringify(z.visible_to).replace(/"/g,"'")}')">
              ${p.name}
            </label>
          `;
        }).join('')}
        <button class="btn btn-outline" style="padding:5px 12px;font-size:11px" onclick="setZoneAllVisible('${z.id}')">所有人可见</button>
      </div>
    </div>
  `).join('');
}

async function renameZone(zoneId, name) {
  if (!name.trim()) return;
  await sb.from('display_zones').update({ name: name.trim() }).eq('id', zoneId);
  showNotif('展示区已重命名');
}

async function setZoneAllVisible(zoneId) {
  await sb.from('display_zones').update({ visible_to: [] }).eq('id', zoneId);
  showNotif('已设置所有人可见');
  loadDisplayZoneSettings();
}

async function updateZoneVisibility(zoneId, playerId, checked) {
  const { data: zone } = await sb.from('display_zones').select('visible_to').eq('id', zoneId).single();
  let vis = zone.visible_to || [];

  if (vis.length === 0) {
    // Was all-visible, now restricting: get all players first
    const { data: players } = await sb.from('players').select('id').eq('room_id', currentRoom.id).eq('is_gm', false);
    vis = players.map(p => p.id);
  }

  if (checked && !vis.includes(playerId)) vis.push(playerId);
  else if (!checked) vis = vis.filter(id => id !== playerId);

  await sb.from('display_zones').update({ visible_to: vis }).eq('id', zoneId);
}

// ===== PUBLIC DISCARD =====
async function loadPublicDiscard() {
  const { data } = await sb.from('discard_cards')
    .select('*, cards(*), players(name)')
    .eq('room_id', currentRoom.id)
    .eq('discard_type', 'public')
    .order('discarded_at', {ascending: false});

  const el = document.getElementById('public-discard-content');
  if (!data || data.length === 0) { el.innerHTML = '<div class="empty">公共弃牌区为空</div>'; return; }

  el.innerHTML = data.map(dc => {
    const card = dc.cards;
    const thumb = card.card_type === 'image'
      ? `<img src="${card.content}" style="width:36px;height:50px;object-fit:cover;border-radius:4px;flex-shrink:0">`
      : `<div class="phc-text">文字</div>`;
    const time = new Date(dc.discarded_at).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    return `
      <div class="player-hand-card">
        ${thumb}
        <div class="phc-info">
          <div class="phc-name">${card.name || (card.card_type==='text'?card.content.slice(0,20):'图片卡')}</div>
          <div class="phc-source">${dc.players?.name || '?'} · ${time}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ===== NAV =====
function showSection(name, btn) {
  if (name === 'createroom') {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
    document.getElementById('sec-createroom').classList.add('active');
    btn.classList.add('active');
    return;
  }
  if (name === 'createroom') {
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
    document.getElementById('sec-createroom').classList.add('active');
    btn.classList.add('active');
    return;
  }
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === 'pools') loadPools();
  if (name === 'cards') loadPoolSelects();
  if (name === 'hands') loadHandTabs();
  if (name === 'display') loadDisplayZoneSettings();
  if (name === 'discard') loadPublicDiscard();
}

async function createRoomFromAdmin() {
  const gmCode = document.getElementById('cr-gm-code').value.trim();
  const err = document.getElementById('cr-err');
  err.textContent = '';

  if (!gmCode) { err.textContent = '请填写GM登录码'; return; }

  const { data: existing } = await sb.from('rooms').select('id').eq('room_code', gmCode);
  if (existing && existing.length > 0) { err.textContent = '该房间码已存在，请换一个'; return; }

  const { data: allRooms } = await sb.from('rooms').select('room_number').order('room_number', {ascending:false}).limit(1);
  const nextNum = allRooms && allRooms.length > 0 ? allRooms[0].room_number + 1 : 1;

  const { data: room, error } = await sb.from('rooms').insert({
    room_code: gmCode,
    room_number: nextNum,
    admin_password: ADMIN_PASSWORD
  }).select().single();

  if (error) { err.textContent = '创建失败：' + error.message; return; }

  await sb.from('players').insert({
    room_id: room.id,
    name: '王座',
    access_code: gmCode,
    is_gm: true,
    seat_number: 0
  });

  for (let i = 1; i <= 6; i++) {
    await sb.from('display_zones').insert({
      room_id: room.id,
      zone_number: i,
      name: '展示区' + i,
      visible_to: []
    });
  }

  document.getElementById('cr-show-code').textContent = gmCode;
  document.getElementById('cr-result').style.display = 'block';
  document.getElementById('cr-gm-code').value = '';
  showNotif('房间创建成功！');
}

function adminLogout() {
  localStorage.removeItem('arcana_admin_code');
  location.reload();
}

function showNotif(msg) {
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
